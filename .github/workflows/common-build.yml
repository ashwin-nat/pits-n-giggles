name: Build App for macOS and Windows

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    env:
      POETRY_VERSION: 2.2.1  # Pin for reproducibility

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: |
            python -m pip install --upgrade pip
            curl -sSL https://install.python-poetry.org | python -
            if [ "$RUNNER_OS" = "Windows" ]; then
            echo "$APPDATA\Python\Scripts" >> $GITHUB_PATH
            else
            echo "$HOME/.local/bin" >> $GITHUB_PATH
            fi
        shell: bash


      - name: Install dependencies
        run: |
          poetry install --no-root --without dev
        shell: bash

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Build with PyInstaller
        run: |
          poetry run python scripts/build.py
        shell: bash

      - name: Prepare artifact
        id: prep-artifact
        run: |
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            APP=$(find dist -name "*.app" | head -n 1)
            BASENAME=$(basename "$APP" .app)
            ZIP_NAME="${BASENAME}-mac.zip"
            cd dist && zip -r "$ZIP_NAME" "$(basename "$APP")"
            echo "artifact_path=dist/${ZIP_NAME}" >> $GITHUB_OUTPUT
            echo "artifact_name=${ZIP_NAME}" >> $GITHUB_OUTPUT
          else
            EXE=$(find dist -name "*.exe" | head -n 1)
            echo "artifact_path=${EXE}" >> $GITHUB_OUTPUT
            echo "artifact_name=$(basename "${EXE}")" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ steps.prep-artifact.outputs.artifact_name }}
          path: ${{ steps.prep-artifact.outputs.artifact_path }}
      - name: Run Smoke Test
        run: |
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            APP_PATH=$(find dist -name "*.app" | head -n 1)
            TEST_FILE="$HOME/Library/Application Support/pits_n_giggles/png_smoke_test.txt"
            # Launch app in smoke test mode with dummy content
            open -W "$APP_PATH" --args --smoke-test "hello-smoke"
            # Verify the file was created
            if [ ! -f "$TEST_FILE" ]; then
              echo "Smoke test failed: $TEST_FILE not found"
              exit 1
            fi
          else
            EXE_PATH=$(find dist -name "*.exe" | head -n 1)
            TEST_FILE="./png_smoke_test.txt"
            # Launch app in smoke test mode with dummy content
            "$EXE_PATH" --smoke-test "hello-smoke"
            # Wait for file creation with polling (timeout: 10s)
            TIMEOUT=10
            INTERVAL=0.5
            ELAPSED=0
            while [ ! -f "$TEST_FILE" ] && [ "$(echo "$ELAPSED < $TIMEOUT" | bc)" -eq 1 ]; do
              sleep $INTERVAL
              ELAPSED=$(echo "$ELAPSED + $INTERVAL" | bc)
            done
            if [ ! -f "$TEST_FILE" ]; then
              echo "Smoke test failed: $TEST_FILE not found after $TIMEOUT seconds"
              exit 1
            fi
          fi
          echo "Smoke test passed!"
        shell: bash
