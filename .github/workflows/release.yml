# Release Pipeline — Pits n' Giggles
#
# USAGE
# -----
# 1. Create a draft GitHub Release with the correct tag and release notes.
# 2. Run this workflow manually from the Actions tab (no inputs required).
#
# The workflow will:
#   - Auto-detect the single existing draft release (fails loudly if 0 or >1).
#   - Check out the exact tagged commit.
#   - Verify meta/meta.py version matches the release tag (safety guard).
#   - Build Windows (.exe) and macOS (.zip of .app) artifacts in parallel.
#   - Run smoke tests on both platforms.
#   - Generate SHA256 checksums for all artifacts.
#   - Wipe any existing assets from the draft release (idempotent re-runs).
#   - Upload all artifacts + checksums.txt to the draft release.
#   - Scan the uploaded binaries with VirusTotal; fail if any engine flags them.
#   - Append a VirusTotal results section to the release notes (idempotent —
#     a rerun replaces the section rather than duplicating it). The rest of
#     the release notes is left untouched.
#   - Publish the draft release automatically once the scan is clean.
#   - Dispatch discord-release.yml to post the announcement (the publish step's
#     own release-published event can't trigger it — GitHub doesn't let the
#     default GITHUB_TOKEN chain into other workflows; workflow_dispatch is
#     exempt from that restriction, so we call it directly instead).
#
# PERMISSIONS REQUIRED
# --------------------
# Requires "Read and write permissions" for the built-in GITHUB_TOKEN:
#   Settings → Actions → General → Workflow permissions → Read and write permissions
# This grants both `contents: write` (releases/tags) and `actions: write`
# (needed to dispatch discord-release.yml), both declared below.
#
# Also requires a VT_API_KEY repo secret (Settings → Secrets and variables →
# Actions → New repository secret) for the VirusTotal scan step. Get a free
# key by creating an account at virustotal.com and copying it from your
# account's API Key page. The free tier (500 scans/day, 4 req/min) is
# sufficient for this release cadence.

name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # 1. Locate the single existing draft release — no version input needed.
  # ───────────────────────────────────────────────────────────────────────────
  find-release:
    name: Find draft release
    runs-on: ubuntu-latest
    outputs:
      tag:        ${{ steps.draft.outputs.tag }}
      release_id: ${{ steps.draft.outputs.release_id }}
      name:       ${{ steps.draft.outputs.name }}

    steps:
      - name: Locate draft release via GitHub API
        id: draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASES=$(gh api "repos/$GITHUB_REPOSITORY/releases" \
            --jq '[.[] | select(.draft == true)]')

          COUNT=$(echo "$RELEASES" | jq 'length')

          if [[ "$COUNT" -eq 0 ]]; then
            echo "::error::No draft release found. Create one in GitHub first."
            exit 1
          elif [[ "$COUNT" -gt 1 ]]; then
            echo "::error::$COUNT draft releases found. Delete or publish the extras before running."
            echo "$RELEASES" | jq -r '.[].tag_name' | while read -r t; do echo "  - $t"; done
            exit 1
          fi

          TAG=$(echo "$RELEASES" | jq -r '.[0].tag_name')
          ID=$(echo  "$RELEASES" | jq -r '.[0].id')
          NAME=$(echo "$RELEASES" | jq -r '.[0].name')

          echo "tag=$TAG"        >> "$GITHUB_OUTPUT"
          echo "release_id=$ID"  >> "$GITHUB_OUTPUT"
          {
            echo "name<<VT_NAME_EOF"
            echo "$NAME"
            echo "VT_NAME_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Targeting draft release: $TAG (id=$ID)"

  # ───────────────────────────────────────────────────────────────────────────
  # 2. Build on Windows and macOS in parallel.
  # ───────────────────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.os }})
    needs: find-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [windows-latest, macos-latest]
    env:
      POETRY_VERSION: 2.2.1

    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.find-release.outputs.tag }}
          submodules: recursive

      # Safety guard: code version must match the release tag.
      - name: Verify meta/meta.py version matches tag
        run: |
          META_VER=$(python -c "import sys; sys.path.insert(0, '.'); from meta.meta import APP_VERSION; print(APP_VERSION)")
          TAG_VER="${{ needs.find-release.outputs.tag }}"
          TAG_VER="${TAG_VER#v}"    # strip leading 'v'  (e.g. v4.2.0 → 4.2.0)
          TAG_VER="${TAG_VER#*/}"  # strip prefix/      (e.g. beta/4.2.0 → 4.2.0)
          if [[ "$META_VER" != "$TAG_VER" ]]; then
            echo "::error::meta/meta.py has version $META_VER but release tag is ${{ needs.find-release.outputs.tag }}"
            echo "::error::Update meta/meta.py before creating the draft release."
            exit 1
          fi
          echo "Version check passed: $META_VER == $TAG_VER"
        shell: bash

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          curl -sSL https://install.python-poetry.org | python -
          if [ "$RUNNER_OS" = "Windows" ]; then
            echo "$APPDATA\Python\Scripts" >> $GITHUB_PATH
          else
            echo "$HOME/.local/bin" >> $GITHUB_PATH
          fi
        shell: bash

      - name: Install dependencies
        run: poetry install --no-root --without dev
        shell: bash

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Build with PyInstaller
        run: poetry run python scripts/build.py
        shell: bash

      - name: Smoke test
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            APP_PATH=$(find dist -name "*.app" | head -n 1)
            TEST_FILE="$HOME/Library/Application Support/pits_n_giggles/png_smoke_test.txt"
            open -W "$APP_PATH" --args --smoke-test "hello-smoke"
            if [ ! -f "$TEST_FILE" ]; then
              echo "Smoke test failed: $TEST_FILE not found"
              exit 1
            fi
          else
            EXE_PATH=$(find dist -name "*.exe" | head -n 1)
            TEST_FILE="./png_smoke_test.txt"
            "$EXE_PATH" --smoke-test "hello-smoke"
            TIMEOUT=10; ELAPSED=0; INTERVAL=0.5
            while [ ! -f "$TEST_FILE" ] && (( $(echo "$ELAPSED < $TIMEOUT" | bc -l) )); do
              sleep $INTERVAL
              ELAPSED=$(echo "$ELAPSED + $INTERVAL" | bc)
            done
            if [ ! -f "$TEST_FILE" ]; then
              echo "Smoke test failed: $TEST_FILE not found after ${TIMEOUT}s"
              exit 1
            fi
          fi
          echo "Smoke test passed!"
        shell: bash

      - name: Prepare artifact
        id: prep
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            APP=$(find dist -name "*.app" | head -n 1)
            BASENAME=$(basename "$APP" .app)
            ZIP_NAME="${BASENAME}-mac.zip"
            (cd dist && zip -r "$ZIP_NAME" "$(basename "$APP")")
            echo "path=dist/${ZIP_NAME}" >> "$GITHUB_OUTPUT"
            echo "name=${ZIP_NAME}"      >> "$GITHUB_OUTPUT"
          else
            EXE=$(find dist -name "*.exe" | head -n 1)
            echo "path=${EXE}"                  >> "$GITHUB_OUTPUT"
            echo "name=$(basename "${EXE}")" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ steps.prep.outputs.name }}
          path: ${{ steps.prep.outputs.path }}
          if-no-files-found: error
          retention-days: 1

  # ───────────────────────────────────────────────────────────────────────────
  # 3. Collect artifacts, checksum, wipe old assets, upload to draft release.
  # ───────────────────────────────────────────────────────────────────────────
  upload-assets:
    name: Upload assets to draft release
    needs: [find-release, build]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
      RELEASE_TAG: ${{ needs.find-release.outputs.tag }}
      RELEASE_ID:  ${{ needs.find-release.outputs.release_id }}

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets
          merge-multiple: true   # flattens subdirs → single directory

      - name: List downloaded files
        run: ls -lh release-assets/

      - name: Generate SHA256 checksums
        run: |
          cd release-assets
          find . -maxdepth 1 -type f | sort | xargs sha256sum \
            | sed 's|\./||' > checksums.txt
          echo "=== checksums.txt ==="
          cat checksums.txt

      # Delete every existing asset on the draft release so re-runs are clean.
      - name: Wipe existing release assets
        run: |
          ASSET_IDS=$(gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID/assets" \
            --jq '.[].id')
          if [[ -z "$ASSET_IDS" ]]; then
            echo "No existing assets to delete."
          else
            for ASSET_ID in $ASSET_IDS; do
              echo "Deleting asset id=$ASSET_ID"
              gh api "repos/$GITHUB_REPOSITORY/releases/assets/$ASSET_ID" -X DELETE
            done
          fi

      - name: Upload artifacts to draft release
        run: |
          cd release-assets
          for FILE in $(find . -maxdepth 1 -type f | sort); do
            echo "Uploading: $(basename "$FILE")"
            gh release upload "$RELEASE_TAG" "$FILE" \
              --repo "$GITHUB_REPOSITORY"
          done
          echo "All files uploaded to draft release $RELEASE_TAG"

  # ───────────────────────────────────────────────────────────────────────────
  # 4. Scan the uploaded binaries with VirusTotal. Fails the job (and blocks
  #    publish-release) if any engine flags either binary as malicious.
  # ───────────────────────────────────────────────────────────────────────────
  virustotal:
    name: VirusTotal scan
    needs: [find-release, upload-assets]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
      VT_API_KEY:  ${{ secrets.VT_API_KEY }}
      RELEASE_TAG: ${{ needs.find-release.outputs.tag }}
      RELEASE_ID:  ${{ needs.find-release.outputs.release_id }}

    steps:
      - name: Check VT_API_KEY is configured
        run: |
          if [[ -z "$VT_API_KEY" ]]; then
            echo "::error::VT_API_KEY secret is not set. Add it under Settings > Secrets and variables > Actions (see release.yml header for how to get a free key)."
            exit 1
          fi

      - name: Scan release binaries with VirusTotal
        run: |
          set -euo pipefail

          ASSETS=$(gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID/assets" \
            --jq '[.[] | select(.name | endswith(".exe") or endswith("-mac.zip")) | {name, url: .browser_download_url}]')

          COUNT=$(echo "$ASSETS" | jq 'length')
          if [[ "$COUNT" -eq 0 ]]; then
            echo "::error::No .exe or -mac.zip assets found on draft release $RELEASE_TAG."
            exit 1
          fi

          : > virustotal-report.txt
          OVERALL_STATUS=0

          echo "$ASSETS" | jq -c '.[]' | while read -r ASSET; do
            NAME=$(echo "$ASSET" | jq -r '.name')
            URL=$(echo "$ASSET" | jq -r '.url')

            echo "Submitting $NAME to VirusTotal..."
            SUBMIT_RESPONSE=$(curl -s -X POST "https://www.virustotal.com/api/v3/urls" \
              -H "x-apikey: $VT_API_KEY" \
              --data-urlencode "url=$URL")
            ANALYSIS_ID=$(echo "$SUBMIT_RESPONSE" | jq -r '.data.id // empty')

            if [[ -z "$ANALYSIS_ID" ]]; then
              echo "::error::VirusTotal submission failed for $NAME: $SUBMIT_RESPONSE"
              echo "- \`$NAME\`: ⚠️ submission failed" >> virustotal-report.txt
              echo 1 > /tmp/vt_failed
              continue
            fi

            echo "Polling analysis $ANALYSIS_ID for $NAME..."
            STATUS="queued"
            ELAPSED=0
            TIMEOUT=900
            INTERVAL=20
            while [[ "$STATUS" != "completed" && "$ELAPSED" -lt "$TIMEOUT" ]]; do
              sleep "$INTERVAL"
              ELAPSED=$((ELAPSED + INTERVAL))
              ANALYSIS=$(curl -s "https://www.virustotal.com/api/v3/analyses/$ANALYSIS_ID" \
                -H "x-apikey: $VT_API_KEY")
              STATUS=$(echo "$ANALYSIS" | jq -r '.data.attributes.status')
            done

            if [[ "$STATUS" != "completed" ]]; then
              echo "::error::VirusTotal analysis for $NAME did not complete within ${TIMEOUT}s."
              echo "- \`$NAME\`: ⚠️ analysis timed out" >> virustotal-report.txt
              echo 1 > /tmp/vt_failed
              continue
            fi

            MALICIOUS=$(echo "$ANALYSIS" | jq -r '.data.attributes.stats.malicious')
            ICON="✅"
            if [[ "$MALICIOUS" -gt 0 ]]; then
              ICON="❌"
            fi
            echo "- \`$NAME\`: $ICON $MALICIOUS malicious detection(s) — [VirusTotal report](https://www.virustotal.com/gui/url/$ANALYSIS_ID)" >> virustotal-report.txt

            if [[ "$MALICIOUS" -gt 0 ]]; then
              echo "::error::VirusTotal flagged $NAME with $MALICIOUS malicious detection(s)."
              echo 1 > /tmp/vt_failed
            fi
          done

          echo "=== virustotal-report.txt ==="
          cat virustotal-report.txt

          if [[ -f /tmp/vt_failed ]]; then
            OVERALL_STATUS=1
          fi
          exit "$OVERALL_STATUS"

      - name: Append VirusTotal results to release notes
        if: always()
        run: |
          set -euo pipefail

          if [[ ! -f virustotal-report.txt ]]; then
            echo "No virustotal-report.txt produced; skipping notes update."
            exit 0
          fi

          START="<!-- virustotal-scan:start -->"
          END="<!-- virustotal-scan:end -->"

          {
            echo "$START"
            echo "### VirusTotal Scan"
            cat virustotal-report.txt
            echo "$END"
          } > vt-section.md

          gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" --jq '.body // ""' > current-notes.md

          # Strip any previous VirusTotal section (idempotent re-runs) then append the fresh one.
          awk -v start="$START" -v end="$END" '
            $0 == start { skip=1; next }
            $0 == end   { skip=0; next }
            !skip
          ' current-notes.md > notes-base.md

          { cat notes-base.md; echo; echo; cat vt-section.md; } > new-notes.md

          jq -n --rawfile body new-notes.md '{body: $body}' \
            | gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" -X PATCH --input -

          echo "Release notes updated with VirusTotal section."

  # ───────────────────────────────────────────────────────────────────────────
  # 5. Publish the draft release. Only runs if the VirusTotal scan passed.
  # ───────────────────────────────────────────────────────────────────────────
  publish-release:
    name: Publish release
    needs: [find-release, virustotal]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
      RELEASE_ID:   ${{ needs.find-release.outputs.release_id }}
      RELEASE_TAG:  ${{ needs.find-release.outputs.tag }}
      RELEASE_NAME: ${{ needs.find-release.outputs.name }}

    steps:
      # tag_name must be re-sent explicitly here: PATCHing draft=false alone
      # can make GitHub re-derive the tag association and spawn a stray
      # "untagged-<hash>" tag instead of keeping the original release tag.
      - name: Flip draft release to published
        run: |
          gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" \
            -X PATCH -f draft=false -f tag_name="$RELEASE_TAG"
          echo "Published release $RELEASE_TAG"

      # The GITHUB_TOKEN-authored publish above does not trigger other
      # workflows' `on: release: published` listeners (GitHub blocks
      # recursive workflow runs from the default token) — so discord-release.yml
      # never fires on its own. workflow_dispatch is explicitly exempt from
      # that restriction, so dispatch it directly instead.
      - name: Notify Discord via workflow_dispatch
        run: |
          gh workflow run discord-release.yml \
            --repo "$GITHUB_REPOSITORY" \
            -f title="$RELEASE_NAME" \
            -f tag="$RELEASE_TAG"
          echo "Dispatched discord-release.yml for $RELEASE_TAG"
