name: Close Stale PRs

on:
  schedule:
    - cron: '0 0 * * *'  # daily at midnight UTC
  workflow_dispatch:

jobs:
  close-stale-prs:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Close stale PRs (skip repo owner)
        uses: actions/github-script@v7
        with:
          script: |
            const STALE_DAYS = 30;
            const OWNER_LOGIN = context.repo.owner;
            const staleCutoff = new Date(Date.now() - STALE_DAYS * 24 * 60 * 60 * 1000);

            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            for (const pr of prs) {
              if (pr.user.login === OWNER_LOGIN) {
                console.log(`Skipping PR #${pr.number} by owner: ${pr.user.login}`);
                continue;
              }

              const updatedAt = new Date(pr.updated_at);
              if (updatedAt < staleCutoff) {
                console.log(`Closing stale PR #${pr.number}: "${pr.title}" (last updated ${pr.updated_at})`);

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body: `This PR has been automatically closed due to ${STALE_DAYS} days of inactivity. Feel free to reopen if you'd like to continue the work.`,
                });

                await github.rest.pulls.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  state: 'closed',
                });
              }
            }
